# Configuración de SonarCloud / SonarQube
# Puedes cambiar estos valores para que coincidan con tu organización y proyecto en SonarCloud.

# Clave única del proyecto y organización en SonarCloud
sonar.organization=upt-faing-epis
sonar.projectKey=upt-faing-epis_proyecto-si784-2026-i-u3-analizador-secretos
sonar.projectName=proyecto-si784-2026-i-u3-analizador-secretos

# Directorios de código fuente y pruebas
sonar.sources=src
sonar.tests=tests

# Codificación y versión de Python
sonar.sourceEncoding=UTF-8
sonar.language=py
sonar.python.version=3.10

# Ruta del reporte de cobertura generado por pytest-cov (formato XML)
sonar.python.coverage.reportPaths=coverage.xml
